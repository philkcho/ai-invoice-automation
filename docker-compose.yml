x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  # ── PostgreSQL ──────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: invoice_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-invoice_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-invoice_password_dev}
      POSTGRES_DB: ${POSTGRES_DB:-invoice_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-invoice_user} -d ${POSTGRES_DB:-invoice_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
    logging: *default-logging

  # ── Redis ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: invoice_redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ./docker/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging: *default-logging

  # ── FastAPI Backend ─────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: invoice_backend
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env.dev
    volumes:
      - ./backend:/app
      - media_files:/app/media
      - ./backend/credentials:/app/credentials:ro
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
    logging: *default-logging

  # ── Celery Worker ───────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: invoice_celery_worker
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - .env.dev
    volumes:
      - ./backend:/app
      - media_files:/app/media
      - ./backend/credentials:/app/credentials:ro
      - ${BACKUP_DIR_HOST:-C:/Users/philk/Documents/invoice-backups}:/backups
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks.celery_app inspect ping --timeout 10"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    stop_grace_period: 120s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
    logging: *default-logging

  # ── Celery Beat (스케줄러) ──────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: invoice_celery_beat
    restart: unless-stopped
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file:
      - .env.dev
    volumes:
      - ./backend:/app
      - ${BACKUP_DIR_HOST:-C:/Users/philk/Documents/invoice-backups}:/backups
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test $(( $(date +%s) - $(stat -c %Y /app/celerybeat-schedule 2>/dev/null || echo 0) )) -lt 300"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    stop_grace_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging: *default-logging

  # ── Flower (Celery 모니터링) ────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: invoice_flower
    restart: unless-stopped
    command: celery -A app.tasks.celery_app flower --port=5555
    env_file:
      - .env.dev
    ports:
      - "5555:5555"
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging: *default-logging

  # ── Next.js Frontend ────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: invoice_frontend
    restart: unless-stopped
    env_file:
      - .env.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    logging: *default-logging

volumes:
  postgres_data:
  media_files:
  redis_data:
