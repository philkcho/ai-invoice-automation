x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  # ── Caddy (리버스 프록시 + 자동 SSL) ──────────────────
  caddy:
    image: caddy:2-alpine
    container_name: invoice_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    logging: *default-logging

  # ── Redis ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: invoice_redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ./docker/redis.conf:/usr/local/etc/redis/redis.conf:ro
    # 프로덕션: 외부 포트 노출 안 함
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M
    logging: *default-logging

  # ── FastAPI Backend ─────────────────────────────────
  backend:
    image: ghcr.io/philkcho/ai-invoice-automation/backend:latest
    container_name: invoice_backend
    restart: unless-stopped
    # 프로덕션: 1GB RAM 서버 — 워커 1개로 메모리 절약
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1
    env_file:
      - .env.prod
    volumes:
      - media_files:/app/media
      - ./backend/credentials:/app/credentials:ro
    # 프로덕션: 외부 포트 노출 안 함 (Caddy 경유)
    expose:
      - "8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 300M
    logging: *default-logging

  # ── Celery Worker ───────────────────────────────────
  celery_worker:
    image: ghcr.io/philkcho/ai-invoice-automation/backend:latest
    container_name: invoice_celery_worker
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=1
    env_file:
      - .env.prod
    volumes:
      - media_files:/app/media
      - backups:/backups
      - ./backend/credentials:/app/credentials:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks.celery_app inspect ping --timeout 10"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    stop_grace_period: 120s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 200M
    logging: *default-logging

  # ── Celery Beat (스케줄러) ──────────────────────────
  celery_beat:
    image: ghcr.io/philkcho/ai-invoice-automation/backend:latest
    container_name: invoice_celery_beat
    restart: unless-stopped
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file:
      - .env.prod
    volumes:
      - backups:/backups
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test $(( $(date +%s) - $(stat -c %Y /app/celerybeat-schedule 2>/dev/null || echo 0) )) -lt 300"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    stop_grace_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 100M
    logging: *default-logging

  # ── Next.js Frontend ────────────────────────────────
  frontend:
    image: ghcr.io/philkcho/ai-invoice-automation/frontend:latest
    container_name: invoice_frontend
    restart: unless-stopped
    env_file:
      - .env.prod
    # 프로덕션: 외부 포트 노출 안 함 (Caddy 경유)
    expose:
      - "3000"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    logging: *default-logging

volumes:
  redis_data:
  media_files:
  backups:
  caddy_data:
  caddy_config:
