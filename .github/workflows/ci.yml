name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Tests ──────────────────────────────────
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: invoice_user
          POSTGRES_PASSWORD: invoice_password_test
          POSTGRES_DB: invoice_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U invoice_user -d invoice_db_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Python syntax check
        working-directory: backend
        run: python -m py_compile app/main.py

      - name: Run pytest
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://invoice_user:invoice_password_test@localhost:5432/invoice_db
          DATABASE_URL_SYNC: postgresql://invoice_user:invoice_password_test@localhost:5432/invoice_db
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/1
          SECRET_KEY: test-secret-key-for-ci
          ALGORITHM: HS256
          ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS1mb3ItY2k=
        run: python -m pytest tests/ -q --tb=short

  # ── Frontend Tests ─────────────────────────────────
  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Jest tests
        working-directory: frontend
        run: npx jest --ci --passWithNoTests

  # ── Docker Build ───────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t invoice-backend ./backend

      - name: Build frontend image
        run: docker build -t invoice-frontend ./frontend
